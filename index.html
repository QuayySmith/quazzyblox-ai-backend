<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuazzyBlox.AI — Roblox Developer AI</title>
  <meta name="description" content="QuazzyBlox.AI is an AI assistant for Roblox Lua, UI, debugging, DataStores, vehicles, economies, and game systems." />
  <style>
    :root{
      --bg:#080910;
      --bg2:#0d0f18;
      --panel:#11131d;
      --panel2:#171a27;
      --panel3:#1f2333;
      --text:#f8f8fb;
      --muted:#9da3ba;
      --soft:#cbd0e2;
      --border:rgba(255,255,255,.105);
      --brand:#7c3cff;
      --brand2:#00d4ff;
      --brand3:#33f0a5;
      --user:#6d4aff;
      --red:#ff5a7a;
      --yellow:#ffd166;
      --shadow:0 22px 80px rgba(0,0,0,.38);
      --radius:22px;
      --code:#070911;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 18% 0%, rgba(124,60,255,.32), transparent 28%),
        radial-gradient(circle at 90% 8%, rgba(0,212,255,.20), transparent 28%),
        linear-gradient(180deg,var(--bg) 0%,#090b13 54%,var(--bg) 100%);
      color:var(--text);
      overflow:hidden;
    }

    button,input,select,textarea{font:inherit}
    button{
      border:1px solid var(--border);
      background:rgba(255,255,255,.06);
      color:var(--text);
      border-radius:14px;
      padding:11px 13px;
      cursor:pointer;
      transition:.16s ease;
    }
    button:hover{background:rgba(255,255,255,.11);transform:translateY(-1px)}
    button:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .primary{background:linear-gradient(135deg,var(--brand),#4961ff);border:0}
    .light{background:var(--text);color:#111;font-weight:900;border:0}
    .danger{color:#ff9cad}

    .app{
      height:100vh;
      display:grid;
      grid-template-columns:300px 1fr;
      overflow:hidden;
    }

    aside{
      background:rgba(17,19,29,.92);
      border-right:1px solid var(--border);
      backdrop-filter:blur(18px);
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
      min-width:0;
      z-index:10;
    }

    .brand{
      display:flex;align-items:center;gap:12px;
      padding:10px 8px 14px;
      border-bottom:1px solid var(--border);
    }
    .logo{
      width:42px;height:42px;border-radius:15px;
      display:grid;place-items:center;
      font-weight:1000;letter-spacing:-.05em;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      box-shadow:0 0 35px rgba(124,60,255,.45);
    }
    .brand strong{display:block;font-size:18px;letter-spacing:-.03em}
    .brand span{display:block;color:var(--muted);font-size:11px;margin-top:2px}

    .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .actions .wide{grid-column:1/-1}

    .section{
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.15em;
      margin:8px 4px 0;
    }

    .mode-list,.chat-list{
      display:flex;flex-direction:column;gap:7px;
      overflow:auto;
      padding-right:2px;
    }

    .mode,.chat-item{
      text-align:left;
      width:100%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-size:13px;
    }
    .mode.active,.chat-item.active{
      background:rgba(124,60,255,.22);
      border-color:rgba(124,60,255,.55);
    }
    .mode small{display:block;color:var(--muted);font-size:11px;margin-top:3px;white-space:normal;line-height:1.3}

    .search{
      width:100%;
      border:1px solid var(--border);
      background:rgba(0,0,0,.18);
      color:var(--text);
      border-radius:14px;
      padding:12px 13px;
      outline:none;
    }

    .side-bottom{
      margin-top:auto;
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
      padding:8px 4px;
    }

    main{
      height:100vh;
      min-width:0;
      display:flex;
      flex-direction:column;
      position:relative;
    }

    .topbar{
      height:64px;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:0 18px;
      background:rgba(8,9,16,.78);
      backdrop-filter:blur(18px);
      z-index:5;
    }
    .top-left{display:flex;align-items:center;gap:10px;min-width:0}
    .mobile-menu{display:none;background:transparent;padding:8px 10px}
    select{
      background:var(--panel2);
      color:var(--text);
      border:1px solid var(--border);
      border-radius:12px;
      padding:9px 12px;
      outline:none;
      max-width:225px;
    }
    .pill{
      border:1px solid var(--border);
      color:var(--muted);
      border-radius:999px;
      padding:7px 11px;
      font-size:12px;
      white-space:nowrap;
    }
    .status{font-size:13px;color:var(--brand3);white-space:nowrap}

    .messages{
      flex:1;
      overflow:auto;
      padding:28px 16px 142px;
      scroll-behavior:smooth;
    }
    .wrap{max-width:920px;margin:0 auto}

    .welcome{
      text-align:center;
      margin:46px auto 28px;
      max-width:820px;
    }
    .welcome h1{
      margin:0 0 12px;
      font-size:48px;
      line-height:1.02;
      letter-spacing:-.07em;
    }
    .gradient{
      background:linear-gradient(135deg,#fff,#a996ff,#73e8ff,#5bffbe);
      -webkit-background-clip:text;background-clip:text;color:transparent;
    }
    .welcome p{
      color:var(--muted);
      line-height:1.6;
      max-width:690px;
      margin:0 auto;
      font-size:16px;
    }
    .cards{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      margin-top:26px;
    }
    .cards button{
      min-height:108px;text-align:left;border-radius:20px;
      background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.035));
      padding:17px;
    }
    .cards b{display:block;margin-bottom:7px;font-size:15px}
    .cards span{display:block;color:var(--muted);font-size:13px;line-height:1.35}

    .msg{
      display:flex;
      gap:14px;
      align-items:flex-start;
      margin:25px 0;
      animation:rise .16s ease both;
    }
    @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .avatar{
      width:36px;height:36px;border-radius:50%;
      display:grid;place-items:center;
      flex:0 0 auto;
      font-size:12px;font-weight:900;
      background:#292e40;
    }
    .msg.user .avatar{background:var(--user)}
    .bubble{
      min-width:0;max-width:100%;
      line-height:1.68;
      white-space:pre-wrap;
      color:#f4f5fc;
    }
    .msg.user .bubble{
      background:var(--user);
      padding:12px 15px;
      border-radius:18px;
      border-top-left-radius:6px;
      box-shadow:0 12px 34px rgba(109,74,255,.22);
    }
    .msg.ai .bubble{width:100%}
    .meta{
      color:var(--muted);
      font-size:12px;
      margin-top:8px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    pre{
      background:var(--code);
      border:1px solid var(--border);
      border-radius:17px;
      padding:14px;
      overflow:auto;
      box-shadow:var(--shadow);
      position:relative;
    }
    code{
      font-family:"SFMono-Regular",Consolas,Menlo,monospace;
      font-size:13px;
      color:#eaf0ff;
    }
    .copy-code{
      position:absolute;
      top:8px;right:8px;
      padding:6px 9px;
      font-size:12px;
      border-radius:10px;
      background:rgba(255,255,255,.08);
    }

    .composer{
      position:fixed;
      left:300px;right:0;bottom:0;
      padding:18px;
      background:linear-gradient(180deg,transparent,var(--bg) 26%);
      z-index:6;
    }
    .composer-inner{
      max-width:920px;margin:0 auto;
      background:rgba(23,26,39,.96);
      border:1px solid var(--border);
      border-radius:24px;
      padding:10px;
      box-shadow:var(--shadow);
    }
    textarea{
      width:100%;
      min-height:62px;
      max-height:190px;
      resize:none;
      border:0;
      outline:none;
      background:transparent;
      color:var(--text);
      padding:12px;
      line-height:1.45;
    }
    .sendbar{
      display:flex;align-items:center;justify-content:space-between;
      gap:10px;padding:0 4px 2px 8px;
    }
    .small{font-size:12px;color:var(--muted)}
    .send{min-width:76px;text-align:center;border-radius:15px}

    .overlay{
      display:none;
      position:fixed;inset:0;
      background:rgba(0,0,0,.5);
      z-index:9;
    }

    .modal{
      display:none;
      position:fixed;
      z-index:30;
      left:50%;top:50%;
      transform:translate(-50%,-50%);
      width:min(520px,calc(100vw - 28px));
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:18px;
    }
    .modal h2{margin:0 0 8px;letter-spacing:-.04em}
    .modal p{color:var(--muted);line-height:1.5}
    .modal input{
      width:100%;
      border:1px solid var(--border);
      background:rgba(0,0,0,.18);
      color:var(--text);
      border-radius:14px;
      padding:12px;
      outline:none;
      margin:8px 0;
    }
    .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}

    @media(max-width:880px){
      .app{grid-template-columns:1fr}
      aside{
        position:fixed;inset:0 auto 0 0;width:300px;
        transform:translateX(-104%);
        transition:.22s ease;
      }
      aside.open{transform:translateX(0)}
      .overlay.show{display:block}
      .composer{left:0}
      .mobile-menu{display:block}
      .welcome h1{font-size:36px}
      .cards{grid-template-columns:1fr}
      .pill{display:none}
      .status{font-size:12px}
    }
  </style>
</head>
<body>
  <div class="overlay" id="overlay" onclick="toggleSidebar(false)"></div>

  <div class="app">
    <aside id="sidebar">
      <div class="brand">
        <div class="logo">QB</div>
        <div>
          <strong>QuazzyBlox.AI</strong>
          <span>Roblox Developer AI</span>
        </div>
      </div>

      <button class="light" onclick="newChat()">+ New chat</button>

      <input class="search" id="search" placeholder="Search chats..." oninput="renderChatList()" />

      <div class="section">Modes</div>
      <div class="mode-list">
        <button class="mode active" data-mode="roblox" onclick="setMode('roblox', this)">Roblox Dev <small>Lua, Studio, UI, systems</small></button>
        <button class="mode" data-mode="debug" onclick="setMode('debug', this)">Debug Mode <small>Find errors and fix scripts</small></button>
        <button class="mode" data-mode="ui" onclick="setMode('ui', this)">UI Designer <small>Phone UI, dashboards, menus</small></button>
        <button class="mode" data-mode="monetize" onclick="setMode('monetize', this)">Monetization <small>Gamepasses, economy, pricing</small></button>
      </div>

      <div class="section">Saved chats</div>
      <div class="chat-list" id="chatList"></div>

      <div class="actions">
        <button onclick="renameChat()">Rename</button>
        <button onclick="exportChat()">Export</button>
        <button class="danger wide" onclick="deleteChat()">Delete current chat</button>
      </div>

      <div class="side-bottom">
        v3 saves chats on this device. Firebase cloud history can be added later without rebuilding the design.
      </div>
    </aside>

    <main>
      <div class="topbar">
        <div class="top-left">
          <button class="mobile-menu" onclick="toggleSidebar()">☰</button>
          <select id="model">
            <option value="gpt-5.5">GPT-5.5 Thinking</option>
            <option value="gpt-5.5-mini">GPT-5.5 Fast</option>
            <option value="gpt-4.1">GPT-4.1 Backup</option>
          </select>
          <span class="pill" id="modePill">Roblox Developer Mode</span>
        </div>
        <div class="status" id="status">Ready</div>
      </div>

      <div class="messages" id="messages">
        <div class="wrap" id="wrap"></div>
      </div>

      <div class="composer">
        <div class="composer-inner">
          <textarea id="input" placeholder="Ask QuazzyBlox.AI to build Roblox scripts, UI, DataStores, gamepasses..."></textarea>
          <div class="sendbar">
            <div class="small">Enter to send • Shift+Enter for new line</div>
            <button class="send light" id="sendBtn" onclick="sendMessage()">Send</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal" id="renameModal">
    <h2>Rename chat</h2>
    <p>Give this conversation a clean name.</p>
    <input id="renameInput" placeholder="Chat name" />
    <div class="modal-actions">
      <button onclick="closeRename()">Cancel</button>
      <button class="primary" onclick="saveRename()">Save</button>
    </div>
  </div>

<script>
const API_URL = "/api/chat";

let chats = JSON.parse(localStorage.getItem("qb_v3_chats") || "[]");
let currentId = localStorage.getItem("qb_v3_current") || null;
let activeMode = localStorage.getItem("qb_v3_mode") || "roblox";

const wrap = document.getElementById("wrap");
const input = document.getElementById("input");
const statusEl = document.getElementById("status");
const sendBtn = document.getElementById("sendBtn");

if(!currentId || !chats.find(c => c.id === currentId)) createChat(false);
setMode(activeMode, document.querySelector(`[data-mode="${activeMode}"]`), false);
renderChatList();
renderCurrentChat();

input.addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});

function save(){
  localStorage.setItem("qb_v3_chats", JSON.stringify(chats));
  localStorage.setItem("qb_v3_current", currentId);
  localStorage.setItem("qb_v3_mode", activeMode);
}

function currentChat(){
  return chats.find(c => c.id === currentId);
}

function createChat(render=true){
  const chat = {
    id: crypto.randomUUID(),
    title: "New chat",
    createdAt: Date.now(),
    updatedAt: Date.now(),
    mode: activeMode,
    messages: []
  };
  chats.unshift(chat);
  currentId = chat.id;
  save();
  if(render){
    renderChatList();
    renderCurrentChat();
  }
}

function newChat(){
  createChat(true);
  toggleSidebar(false);
}

function renderChatList(){
  const q = (document.getElementById("search").value || "").toLowerCase();
  const list = document.getElementById("chatList");
  list.innerHTML = "";
  chats
    .filter(c => (c.title || "").toLowerCase().includes(q) || c.messages.some(m => m.content.toLowerCase().includes(q)))
    .forEach(chat => {
      const b = document.createElement("button");
      b.className = "chat-item" + (chat.id === currentId ? " active" : "");
      b.textContent = chat.title || "New chat";
      b.onclick = () => {
        currentId = chat.id;
        save();
        renderChatList();
        renderCurrentChat();
        toggleSidebar(false);
      };
      list.appendChild(b);
    });
}

function renderWelcome(){
  wrap.innerHTML = `
    <div class="welcome">
      <h1><span class="gradient">Build Roblox faster.</span></h1>
      <p>QuazzyBlox.AI writes Roblox Lua, designs UI, fixes bugs, builds systems, creates gamepass ideas, and explains where every script goes in Roblox Studio.</p>
      <div class="cards">
        <button onclick="quick('Write a Roblox loading screen that loads player data safely, has an 8 second timeout, fades out, and opens a dashboard.')">
          <b>Safe loading screen</b>
          <span>Stop infinite loading and open the real dashboard after player data loads.</span>
        </button>
        <button onclick="quick('Make me a modern Roblox phone UI with Map, Vehicles, Jobs, Messages, Bank, Settings, and setup steps.')">
          <b>Phone dashboard UI</b>
          <span>Mobile-friendly UI layout with clean structure and scripts.</span>
        </button>
        <button onclick="quick('Write a Roblox leaderstats cash system with passive income every 5 minutes, DataStore saving, and 2x gamepass support.')">
          <b>Economy system</b>
          <span>Server-sided cash, saving, passive income, and gamepass boost.</span>
        </button>
        <button onclick="quick('Create gamepass ideas for a realistic Texarkana driving RP game with prices, perks, and descriptions.')">
          <b>Gamepass ideas</b>
          <span>Premium passes, pricing, perks, and descriptions.</span>
        </button>
      </div>
    </div>`;
}

function renderCurrentChat(){
  const chat = currentChat();
  wrap.innerHTML = "";
  if(!chat || chat.messages.length === 0){
    renderWelcome();
    return;
  }
  chat.messages.forEach(m => addDomMessage(m.role, m.content, false));
  addCopyButtons();
  scrollDown();
}

function addDomMessage(role, content, animate=true){
  if(wrap.querySelector(".welcome")) wrap.innerHTML = "";
  const msg = document.createElement("div");
  msg.className = "msg " + role;

  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = role === "user" ? "You" : "QB";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = renderMarkdown(content);

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  wrap.appendChild(msg);
  addCopyButtons();
  return bubble;
}

function renderMarkdown(text){
  let safe = escapeHtml(text || "");
  safe = safe.replace(/```(\w+)?\n([\s\S]*?)```/g, (m, lang, code) => {
    return `<pre><button class="copy-code" onclick="copyCode(this)">Copy</button><code>${escapeHtml(code)}</code></pre>`;
  });
  safe = safe.replace(/`([^`]+)`/g, "<code>$1</code>");
  safe = safe.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  return safe;
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function addCopyButtons(){
  document.querySelectorAll("pre").forEach(pre => {
    if(!pre.querySelector(".copy-code")){
      const btn = document.createElement("button");
      btn.className = "copy-code";
      btn.textContent = "Copy";
      btn.onclick = () => copyCode(btn);
      pre.appendChild(btn);
    }
  });
}

function copyCode(btn){
  const code = btn.parentElement.querySelector("code").innerText;
  navigator.clipboard.writeText(code);
  btn.textContent = "Copied";
  setTimeout(() => btn.textContent = "Copy", 900);
}

function pushMessage(role, content){
  const chat = currentChat();
  chat.messages.push({role, content, at: Date.now()});
  chat.updatedAt = Date.now();
  if(role === "user" && chat.title === "New chat"){
    chat.title = content.slice(0, 45);
  }
  save();
  renderChatList();
  return addDomMessage(role, content);
}

function updateLastAI(content){
  const chat = currentChat();
  const last = chat.messages[chat.messages.length - 1];
  if(last && last.role === "assistant"){
    last.content = content;
    chat.updatedAt = Date.now();
    save();
  }
}

async function sendMessage(){
  const text = input.value.trim();
  if(!text) return;

  pushMessage("user", text);
  input.value = "";
  input.style.height = "auto";
  const bubble = pushMessage("assistant", "");
  setBusy(true);

  try{
    const chat = currentChat();

    const apiMessages = chat.messages
      .filter(m => m.content.trim())
      .slice(-26)
      .map(m => ({role: m.role, content: m.content}));

    const res = await fetch(API_URL, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model: document.getElementById("model").value,
        mode: activeMode,
        messages: apiMessages
      })
    });

    const data = await res.json();

    if(!res.ok){
      throw new Error(data.details || data.error || "Backend error");
    }

    const reply = data.reply || "No response returned.";
    await typeMarkdown(bubble, reply);
    updateLastAI(reply);
    setBusy(false);
  }catch(err){
    const msg =
`I could not reach the AI backend yet.

Error:
${err.message}

Fix checklist:
1. Vercel project is deployed.
2. api/chat.js exists.
3. OPENAI_API_KEY is added in Vercel.
4. Redeploy after adding the API key.
5. Make sure your model name is available on your OpenAI account.`;
    bubble.innerHTML = renderMarkdown(msg);
    updateLastAI(msg);
    setBusy(false, "Backend issue");
  }

  scrollDown();
}

async function typeMarkdown(el, text){
  el.textContent = "";
  let out = "";
  for(let i=0;i<text.length;i++){
    out += text[i];
    el.innerHTML = renderMarkdown(out);
    if(i % 3 === 0) scrollDown();
    await new Promise(r => setTimeout(r, 3));
  }
  el.innerHTML = renderMarkdown(text);
  addCopyButtons();
  scrollDown();
}

function setBusy(busy, text){
  sendBtn.disabled = busy;
  statusEl.textContent = text || (busy ? "Thinking..." : "Ready");
}

function scrollDown(){
  const box = document.getElementById("messages");
  box.scrollTop = box.scrollHeight;
}

function quick(text){
  input.value = text;
  sendMessage();
}

function setMode(mode, btn, render=true){
  activeMode = mode;
  document.querySelectorAll(".mode").forEach(b => b.classList.remove("active"));
  if(btn) btn.classList.add("active");
  const names = {
    roblox:"Roblox Developer Mode",
    debug:"Debug Mode",
    ui:"UI Designer Mode",
    monetize:"Monetization Mode"
  };
  document.getElementById("modePill").textContent = names[mode] || "Roblox Developer Mode";
  save();
  if(render) toggleSidebar(false);
}

function renameChat(){
  const chat = currentChat();
  document.getElementById("renameInput").value = chat.title || "";
  document.getElementById("renameModal").style.display = "block";
}

function closeRename(){
  document.getElementById("renameModal").style.display = "none";
}

function saveRename(){
  const chat = currentChat();
  const name = document.getElementById("renameInput").value.trim();
  if(name) chat.title = name;
  save();
  renderChatList();
  closeRename();
}

function deleteChat(){
  chats = chats.filter(c => c.id !== currentId);
  if(chats.length === 0) createChat(false);
  else currentId = chats[0].id;
  save();
  renderChatList();
  renderCurrentChat();
}

function exportChat(){
  const chat = currentChat();
  const blob = new Blob([JSON.stringify(chat, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "quazzyblox-ai-chat.json";
  a.click();
}

function toggleSidebar(force){
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  if(force === false){
    sidebar.classList.remove("open");
    overlay.classList.remove("show");
  }else{
    sidebar.classList.toggle("open");
    overlay.classList.toggle("show");
  }
}
</script>
